name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build kforge
        run: go build -ldflags="-X github.com/MuyleangIng/kforge/internal/meta.Version=ci-${GITHUB_SHA::7}" -o /tmp/kforge ./cmd/

      - name: Smoke test binary
        run: |
          /tmp/kforge version
          /tmp/kforge docker-cli-plugin-metadata
