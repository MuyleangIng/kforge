name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build & Release (Linux + Windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: goreleaser
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X github.com/MuyleangIng/kforge/commands.Version=${VERSION}" \
            -o kforge ./cmd/

      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=${{ matrix.goarch }}
          mkdir -p staging
          cp kforge staging/
          hdiutil create \
            -volname "kforge ${VERSION}" \
            -srcfolder staging \
            -ov -format UDZO \
            "kforge_${VERSION}_darwin_${ARCH}.dmg"

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=${{ matrix.goarch }}
          gh release upload "${VERSION}" \
            "kforge_${VERSION}_darwin_${ARCH}.dmg" \
            --clobber
