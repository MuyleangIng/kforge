version: 2
project_name: kforge

before:
  hooks:
    - go mod tidy

builds:
  - id: kforge
    main: ./cmd/
    binary: kforge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/MuyleangIng/kforge/internal/meta.Version={{.Version}}

archives:
  - id: default
    name_template: "kforge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

nfpms:
  - id: packages
    package_name: kforge
    file_name_template: "kforge_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/MuyleangIng/kforge
    maintainer: Ing Muyleang <muyleang@khmerstack.com>
    description: Personal multi-platform Docker image builder powered by BuildKit
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
